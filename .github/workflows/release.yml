name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Fast feedback: typecheck + unit tests + audit + build sanity check.
  # No browser install, no e2e — runs in ~3 min and gates the slower jobs
  # below so an obvious typo / failing test doesn't waste 5 min on a Mac
  # / Win runner.
  unit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Typecheck (client + server + electron + tests)
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Production audit
        run: npm run audit:prod

      - name: Build sanity check
        run: npm run build

  # E2E in its own runner so it overlaps with mac/win builds. Used to
  # block them; now it runs in parallel because mac/win don't depend on
  # browser tests passing — the unit job already ensures the bundle and
  # types are sound.
  e2e:
    runs-on: ubuntu-latest
    needs: unit

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Cache the Playwright browser binaries (~170 MB chromium) so the
      # 30s install only happens on a clean cache miss.
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: End-to-end tests
        run: npm run test:e2e -- --project=chromium

      # Only upload the Playwright report when something went wrong.
      # Successful runs don't need artifacts archived, and the
      # account-level artifact storage is chronically near quota.
      - name: Upload Playwright report
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v5
        with:
          name: release-playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7

  build-mac:
    runs-on: macos-latest
    needs: unit

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build icons
        run: npm run build:icons

      - name: Validate update proxy release config
        run: |
          if [ -z "$VOTER_SERVICE_UPDATE_PROXY_URL" ]; then
            echo "::error::Missing VOTER_SERVICE_UPDATE_PROXY_URL repository secret."
            exit 1
          fi
          if [ -z "$VOTER_SERVICE_UPDATE_PROXY_TOKEN" ]; then
            echo "::error::Missing VOTER_SERVICE_UPDATE_PROXY_TOKEN repository secret."
            exit 1
          fi
        env:
          VOTER_SERVICE_UPDATE_PROXY_URL: ${{ secrets.VOTER_SERVICE_UPDATE_PROXY_URL }}
          VOTER_SERVICE_UPDATE_PROXY_TOKEN: ${{ secrets.VOTER_SERVICE_UPDATE_PROXY_TOKEN }}

      - name: Build app
        run: npm run build
        env:
          VOTER_SERVICE_UPDATE_PROXY_URL: ${{ secrets.VOTER_SERVICE_UPDATE_PROXY_URL }}
          VOTER_SERVICE_UPDATE_PROXY_TOKEN: ${{ secrets.VOTER_SERVICE_UPDATE_PROXY_TOKEN }}

      # electron-builder uploads .dmg / .dmg.blockmap / latest-mac.yml
      # directly to the GitHub draft release. We skip the intermediate
      # actions/upload-artifact step so we don't burn the account-level
      # artifact storage quota.
      - name: Package & publish macOS DMG
        run: npx electron-builder --mac --publish always
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          CSC_LINK: ""
          CSC_KEY_PASSWORD: ""
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-win:
    runs-on: windows-latest
    needs: unit

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build icons
        run: npm run build:icons

      - name: Validate update proxy release config
        shell: pwsh
        run: |
          if (-not $env:VOTER_SERVICE_UPDATE_PROXY_URL) {
            Write-Error "Missing VOTER_SERVICE_UPDATE_PROXY_URL repository secret."
            exit 1
          }
          if (-not $env:VOTER_SERVICE_UPDATE_PROXY_TOKEN) {
            Write-Error "Missing VOTER_SERVICE_UPDATE_PROXY_TOKEN repository secret."
            exit 1
          }
        env:
          VOTER_SERVICE_UPDATE_PROXY_URL: ${{ secrets.VOTER_SERVICE_UPDATE_PROXY_URL }}
          VOTER_SERVICE_UPDATE_PROXY_TOKEN: ${{ secrets.VOTER_SERVICE_UPDATE_PROXY_TOKEN }}

      - name: Build app
        run: npm run build
        env:
          VOTER_SERVICE_UPDATE_PROXY_URL: ${{ secrets.VOTER_SERVICE_UPDATE_PROXY_URL }}
          VOTER_SERVICE_UPDATE_PROXY_TOKEN: ${{ secrets.VOTER_SERVICE_UPDATE_PROXY_TOKEN }}

      - name: Package & publish Windows
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    # publish only after all 3 of unit/e2e/mac/win finish to ensure the
    # tag isn't promoted to 'latest' on a partial release.
    needs: [unit, e2e, build-mac, build-win]
    runs-on: ubuntu-latest

    steps:
      # Promote the draft release that electron-builder created to a
      # published release, so /api/system/version-check and electron-
      # updater can see it. Best-effort; non-fatal if not found.
      - name: Promote draft release to published
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "Promoting tag: $TAG"
          gh release edit "$TAG" \
            --repo Sterio068/voter-service-system \
            --draft=false \
            --latest \
            || echo "::warning::Release '$TAG' not found or already published."
