name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Full verification
        run: npm run verify

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: End-to-end tests
        run: npm run test:e2e -- --project=chromium

      # Only upload the Playwright report when something went wrong.
      # Successful runs don't need artifacts archived, and the
      # account-level artifact storage is chronically near quota.
      - name: Upload Playwright report
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v5
        with:
          name: release-playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7

  build-mac:
    needs: verify
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build icons
        run: npm run build:icons

      - name: Build app
        run: npm run build

      # electron-builder uploads .dmg / .dmg.blockmap / latest-mac.yml /
      # latest-mac-arm64.yml directly to the GitHub draft release. We skip
      # the intermediate actions/upload-artifact step so we don't burn the
      # account-level artifact storage quota.
      - name: Package & publish macOS DMG
        run: npx electron-builder --mac --publish always
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          CSC_LINK: ""
          CSC_KEY_PASSWORD: ""
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-win:
    needs: verify
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build icons
        run: npm run build:icons

      - name: Build app
        run: npm run build

      - name: Package & publish Windows
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest

    steps:
      # Promote the draft release that electron-builder created to a
      # published release, so /api/system/version-check and electron-
      # updater can see it. Best-effort; non-fatal if not found.
      - name: Promote draft release to published
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "Promoting tag: $TAG"
          gh release edit "$TAG" \
            --repo Sterio068/voter-service-system \
            --draft=false \
            --latest \
            || echo "::warning::Release '$TAG' not found or already published."
